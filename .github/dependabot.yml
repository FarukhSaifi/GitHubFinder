version: 2
updates:
  # npm — up to 2 open PRs: one for safe minor/patch, one for major (30-day cooldown).
  # Review requests: CODEOWNERS only (no duplicate reviewers here or in workflows).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    labels:
      - "dependencies"
    open-pull-requests-limit: 1
    versioning-strategy: increase
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 7
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      npm-major:
        patterns:
          - "*"
        update-types:
          - "major"
        # Packages without ESLint 10 peer support break npm install when grouped.
        exclude-patterns:
          - "eslint-plugin-import"
          - "eslint-plugin-react"
          - "eslint-plugin-prettier"
          - "eslint-config-prettier"
          - "@typescript-eslint/*"
    ignore:
      # Removed from package.json — not compatible with eslint@10 flat config setup.
      - dependency-name: "eslint-plugin-import"
      - dependency-name: "eslint-plugin-react"
      - dependency-name: "eslint-plugin-prettier"
      - dependency-name: "eslint-config-prettier"
      - dependency-name: "@typescript-eslint/eslint-plugin"
      - dependency-name: "@typescript-eslint/parser"
